name: Python CI

on:
  push:
    branches: [ "**" ]          # läuft auf JEDEM Branch
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest          # Tools explizit – nicht dem requirements.txt-Zufall überlassen
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Linting mit ruff
        run: ruff check .

      - name: Format-Check mit black
        run: black --check .

      - name: Tests mit pytest ausführen
        run: |
          pytest
          # Exit-Code 5 = "keine Tests gefunden" wird NICHT als Fehler gewertet,
          # solange du noch keine Tests hast. Echte Test-Fehler bleiben rot.
          if [ $? -eq 5 ]; then
            echo "Noch keine Tests vorhanden – überspringe."
            exit 0
          fi