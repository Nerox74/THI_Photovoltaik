name: Python CI

# Definiert, wann die Pipeline laufen soll
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Hier kannst du verschiedene Python-Versionen gleichzeitig testen lassen
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Code auschecken
      uses: actions/checkout@v4

    # 2. Python Umgebung einrichten
    - name: Python ${{ matrix.python-version }} einrichten
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Aktiviert Caching für schnellere Builds

    # 3. Abhängigkeiten installieren
    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Code-Stil überprüfen (Linting)
    - name: Linting mit ruff
      run: |
        pip install ruff
        ruff check .
    - name: Format-Check mit black
      run: |
        pip install black
        black --check .

    # 5. Tests ausführen
    - name: Tests mit pytest ausführen
      run: |
        pytest